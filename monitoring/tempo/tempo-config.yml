stream_over_http_enabled: true

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
    block:
      bloom_filter_false_positive: 0.05
    pool:
      max_workers: 50
      queue_depth: 2000

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: investplatform
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces
  processor:
    span_metrics:
      dimensions:
        - service.name
        - http.method
        - http.status_code
    service_graphs:
      dimensions:
        - service.name

overrides:
  defaults:
    metrics_generator:
      processors:
        - span-metrics
        - service-graphs

compactor:
  compaction:
    block_retention: 168h

usage_report:
  reporting_enabled: false
